name: CI

on:
  push:
  pull_request:

jobs:
  native:
    name: ${{ matrix.os }} native
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DWEBWRAP_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  emscripten:
    name: emscripten
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: >
          emcmake cmake
          -S .
          -B build-emscripten
          -DWEBWRAP_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CROSSCOMPILING_EMULATOR=node

      - name: Build
        run: cmake --build build-emscripten

      - name: Test
        run: ctest --test-dir build-emscripten --output-on-failure
